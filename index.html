<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header class="header">
      <svg class="favicon" viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor"
          d="M12 2C6.49 2 2 6.49 2 12s4.49 10 9.99 10c1.13 0 2.01-.88 2.01-2 0-.54-.22-1.03-.57-1.39-.34-.36-.56-.84-.56-1.38 0-1.12.89-2 2-2h1.63c2.76 0 5-2.24 5-5 0-4.42-4.03-8.23-9.5-8.23zm-4.5 9c-.83 0-1.5-.67-1.5-1.5S6.67 8 7.5 8 9 8.67 9 9.5 8.33 11 7.5 11zm4.5-3c-.83 0-1.5-.67-1.5-1.5S11.17 5 12 5s1.5.67 1.5 1.5S12.83 8 12 8zm4.5 3c-.83 0-1.5-.67-1.5-1.5S15.17 8 16 8s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z" />
      </svg>
      <h1>염색 코드 추출</h1>
    </header>

    <div id="upload-zone" class="upload-zone">
      <div class="upload-content">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="#a1a1aa">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z" />
        </svg>
        <h2>이미지 가져오기</h2>
        <p>파일을 드래그하거나 클립보드에서 붙여넣기</p>
        <button id="btn-file-select" class="btn primary">파일 선택</button>
        <input type="file" id="file-input" accept="image/*" hidden>
      </div>
    </div>

    <div id="workspace" class="workspace hidden">
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="btn-crop" class="btn outline">크롭</button>
          <button id="btn-original" class="btn outline">원본</button>
        </div>
        <div class="toolbar-right">
          <button id="btn-copy-all" class="btn ghost" disabled>코드 복사</button>
          <button id="btn-save-img" class="btn ghost" disabled>이미지 저장</button>
          <button id="btn-reset" class="btn danger-ghost" disabled>슬롯 초기화</button>
        </div>
      </div>

      <div id="canvas-wrapper" class="canvas-wrapper">
        <button id="btn-close-img" class="btn-close-img" title="이미지 삭제">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor"
              d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
          </svg>
        </button>
        <div class="canvas-container">
          <canvas id="main-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
        <div id="magnifier" class="magnifier hidden">
          <canvas id="mag-canvas" width="80" height="80"></canvas>
          <div class="crosshair"></div>
        </div>
      </div>

      <div id="color-slots" class="color-slots"></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <canvas id="export-canvas" hidden></canvas>
  </div>

  <script src="app.js"></script>
</body>

</html>
